app = 'amopoint-test-young-lantern-9332'
primary_region = 'arn'

[build]
  dockerfile = 'docker/Dockerfile'

[env]
  APP_ENV = 'production'
  APP_DEBUG = 'false'
  APP_URL = 'https://amopoint-test-young-lantern-9332.fly.dev'
  DB_CONNECTION = 'sqlite'
  DB_DATABASE = '/data/database.sqlite'

[mounts]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1